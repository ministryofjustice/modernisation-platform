name: New Collaborator
description: Add a Modernisation Platform collaborator.
title: "New collaborator"
labels: [ "collaborator", "kanban" ]
body:
- type: markdown
  attributes:
    value: |
      Please complete this template to facilitate adding a new external collaborator.
- type: markdown
  attributes:
    value: "## Requestor details"
- type: input
  id: requestor-name
  attributes:
    label: Requestor name
    description: The full name of the person making this request.
    placeholder: e.g., Bilbo Baggins
  validations:
    required: true
- type: input
  id: requestor-email
  attributes:
    label: Requestor email address
    description: Must be a valid @justice.gov.uk email address.
    placeholder: e.g., user@justice.gov.uk
  validations:
    required: true
- type: markdown
  attributes:
    value: "## Collaborator details"
- type: input
  id: collaborator-name
  attributes:
    label: Collaborator name/email address
    description: The full name of the new external collaborator.
    placeholder: e.g., Frodo.Baggins@theshire.com
  validations:
    required: true
- type: input
  id: collaborator-github
  attributes:
    label: Collaborator GitHub username
    description: The GitHub username of the new external collaborator.
    placeholder: e.g., Ffffrodo
  validations:
    required: true
- type: input
  id: collaborator-application
  attributes:
    label: Collaborator requested application
    description: The name of the Modernisation Platform application that new external collaborator requires access to.
    placeholder: e.g., `rivendell`
  validations:
    required: true
- type: dropdown
  id: application-environments
  attributes:
    label: Environments requiring access
    description: Please select the environments that the new external collaborator requires access to.
    multiple: true
    options:
    - "development"
    - "test"
    - "preproduction"
    - "production"
  validations:
    required: true
- type: markdown
  attributes:
    value: "## Additional information"
- type: dropdown
  id: push-permissions
  attributes:
    label: Push permissions
    description: Does this collaborator need `push` permissions for any of the following repositories?
    multiple: true
    options:
    - "modernisation-platform-environments"
    - "modernisation-platform-ami-builds"
  validations:
    required: false
- type: dropdown
  id: additional-approve-deployments
  attributes:
    label: Additional deployment approval access
    description: Does this collaborator need the ability to approve deployments through GitHub Actions?
    multiple: true
    options:
    - "Yes"
    - "No"
  validations:
    required: false
- type: textarea
  id: additional-information
  attributes:
    label: Additional information
    description: Add any supporting information which relates to your request here.
    render: markdown
  validations:
    required: false
