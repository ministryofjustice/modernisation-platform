name: Environment Request

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username to test org membership for'
        required: true
        default: ''

permissions: read-all

jobs:
  handle-request:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'New Account')
    runs-on: ubuntu-latest
    steps:
      - name: Check org membership
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="${{ github.event.inputs.username || github.event.issue.user.login }}"
          AUTHOR_ASSOC="${{ github.event.issue.author_association }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/ministryofjustice/members/${USERNAME}")
          echo "User: ${USERNAME}"
          echo "author_association: ${AUTHOR_ASSOC}"
          echo "Org membership API status: ${STATUS}"
          if [ "$STATUS" = "204" ]; then
            echo "RESULT: MEMBER (org API confirmed)"
          elif [ "$STATUS" = "302" ]; then
            echo "RESULT: PRIVATE MEMBER (org API redirect - token may lack org:read scope)"
          else
            echo "RESULT: NOT A MEMBER (status ${STATUS})"
            exit 1
          fi

      - if: false
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        if: false
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'

      - name: Save issue body to file
        if: false
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "$ISSUE_BODY" > issue_body.txt
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV

      - name: Extract fields from issue
        if: false
        run: |
          # Function to extract and sanitize field values
          extract_field() {
            local key="$1"
            local value=$(awk -v k="$key" '$0==k {while(getline>0){if($0~/^$/)continue;if($0~/^_No response_$/){print "";exit}print $0;exit}}' issue_body.txt | xargs)
            # Sanitize: remove newlines/carriage returns, limit to 200 chars
            echo "$value" | tr -d '\n\r' | head -c 200
          }
          
          # Extract all fields
          EXISTING_ACCOUNT=$(extract_field "### Is this an existing AWS account?")
          APP_NAME=$(extract_field "### Application Name")
          APP_TAG=$(extract_field "### application")
          BUSINESS_UNIT=$(extract_field "### business-unit")
          INFRA_SUPPORT=$(extract_field "### infrastructure-support")
          OWNER=$(extract_field "### owner")
          SSO_GROUP=$(extract_field "### SSO Group Name")
          ISOLATED_ACCOUNT=$(extract_field "### Do you require isolated networking?")
          SLACK=$(extract_field "### Slack Channel")
          GITHUB_OWNERS=$(extract_field "### GitHub code owner team slug")
          GITHUB_REVIEWERS=$(extract_field "### GitHub actions reviewer team slug")
          
          # Write to GITHUB_ENV
          {
            echo "EXISTING_ACCOUNT=$EXISTING_ACCOUNT"
            echo "APP_NAME=$APP_NAME"
            echo "APP_TAG=$APP_TAG"
            echo "BUSINESS_UNIT=$BUSINESS_UNIT"
            echo "INFRA_SUPPORT=$INFRA_SUPPORT"
            echo "OWNER=$OWNER"
            echo "SSO_GROUP=$SSO_GROUP"
            echo "ISOLATED_ACCOUNT=$ISOLATED_ACCOUNT"
            echo "SLACK=$SLACK"
            echo "GITHUB_OWNERS=$GITHUB_OWNERS"
            echo "GITHUB_REVIEWERS=$GITHUB_REVIEWERS"
          } >> $GITHUB_ENV

      - name: Validate Slack field (no #)
        if: false
        run: |
          if [[ "${SLACK}" == *"#"* ]]; then
            echo "::error title=Invalid Slack Channel::SLACK must not include '#'. Please enter the channel name without the leading hash (e.g. 'my-channel' not '#my-channel'). Value: '${SLACK}'"
            exit 1
          fi

      - name: Extract environment selections
        if: false
        run: |
          ENVIRONMENTS=""

          # Development
          DEV_SELECTED=$(awk '/- \[x\] Development/ {print "true"}' issue_body.txt)
          DEV_ACCESS=$(awk -v key="### Environment access level Development" '
            $0==key {found=1; next}
            found && /^### / {exit}
            found && NF && $0!="_No response_" {print $0}
          ' issue_body.txt | paste -sd, -)
          if [ "$DEV_SELECTED" = "true" ]; then
            ENVIRONMENTS="${ENVIRONMENTS}{\"name\": \"development\", \"access_level\": \"$DEV_ACCESS\"},"
          fi

          # Test
          TEST_SELECTED=$(awk '/- \[x\] test/ {print "true"}' issue_body.txt)
          TEST_ACCESS=$(awk -v key="### Environment access level Test" '
            $0==key {found=1; next}
            found && /^### / {exit}
            found && NF && $0!="_No response_" {print $0}
          ' issue_body.txt | paste -sd, -)
          if [ "$TEST_SELECTED" = "true" ]; then
            ENVIRONMENTS="${ENVIRONMENTS}{\"name\": \"test\", \"access_level\": \"$TEST_ACCESS\"},"
          fi

          # Preproduction
          PREPROD_SELECTED=$(awk '/- \[x\] Preproduction/ {print "true"}' issue_body.txt)
          PREPROD_ACCESS=$(awk -v key="### Environment access level Preproduction" '
            $0==key {found=1; next}
            found && /^### / {exit}
            found && NF && $0!="_No response_" {print $0}
          ' issue_body.txt | paste -sd, -)
          if [ "$PREPROD_SELECTED" = "true" ]; then
            ENVIRONMENTS="${ENVIRONMENTS}{\"name\": \"preproduction\", \"access_level\": \"$PREPROD_ACCESS\"},"
          fi

          # Production
          PROD_SELECTED=$(awk '/- \[x\] Production/ {print "true"}' issue_body.txt)
          PROD_ACCESS=$(awk -v key="### Environment access level Production" '
            $0==key {found=1; next}
            found && /^### / {exit}
            found && NF && $0!="_No response_" {print $0}
          ' issue_body.txt | paste -sd, -)
          if [ "$PROD_SELECTED" = "true" ]; then
            ENVIRONMENTS="${ENVIRONMENTS}{\"name\": \"production\", \"access_level\": \"$PROD_ACCESS\"},"
          fi

          # Remove trailing comma and wrap in brackets
          ENV_SELECTIONS_JSON="[$(echo $ENVIRONMENTS | sed 's/,$//')]"
          echo "ENV_SELECTIONS_JSON=$ENV_SELECTIONS_JSON" >> $GITHUB_ENV

      - name: Create and checkout branch for environment request
        if: false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run create-account.py for new accounts
        if: false
        run: |
          ls -l scripts
          python scripts/create-account.py "$APP_NAME" "$APP_TAG" "$GITHUB_OWNERS" "$GITHUB_REVIEWERS" "$BUSINESS_UNIT" "$INFRA_SUPPORT" "$OWNER" "$SLACK" "false" "$SSO_GROUP" "" "$ENV_SELECTIONS_JSON"

      - name: Run amend-accounts.py for existing accounts
        if: false
        run: |
          python scripts/amend-accounts.py \
            "$APP_NAME" \
            "$SSO_GROUP" \
            "$ENV_SELECTIONS_JSON"
            # Add other arguments as needed for your amend script

      - name: remove issue template files
        if: false
        run: rm -f issue_body.txt

      - name: Install GitHub CLI
        if: false
        run: |
          sudo apt-get update
          sudo apt-get install gh
  
      - name: Create a signed commit for new accounts
        if: false
        uses: ministryofjustice/modernisation-platform-github-actions/signed-commit@5c713c93eea694829b1bd3f410d0b235053318ce # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "Automated environment request for $APP_NAME"
          pr_body: "This PR was created automatically to update generated files. Linked to #${{ github.event.issue.number }}"


      - name: Commit changes for existing accounts
        if: false
        uses: ministryofjustice/modernisation-platform-github-actions/signed-commit@5c713c93eea694829b1bd3f410d0b235053318ce # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "Automated environment amendment request for $APP_NAME"
          pr_body: "This PR was created automatically to update generated files. Linked to #${{ github.event.issue.number }}"


      - name: Comment on issue with PR link
        if: false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="Automated environment amendment request for $APP_NAME"
          PR_URL=$(gh pr list --state open --search "$pr_title in:title" --json url -q '.[0].url')
          echo "PR URL: $PR_URL"
          REPO="${{ github.repository }}"
          gh issue comment $ISSUE_NUMBER --repo "$REPO" --body "A pull request has been created for your environment request: $PR_URL"
      
      - name: Save network setup info
        if: false
        run: |
          echo "{\"pr_number\": ${{ github.event.pull_request.number }}, ISOLATED_ACCOUNT, \"app_name\": \"$APP_NAME\", \"business_unit\": \"$BUSINESS_UNIT\", \"environments\": $(echo $ENV_SELECTIONS_JSON | jq -c 'map(.name)')}" > network-setup-info.json
      - if: false
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: network-setup-info
          path: network-setup-info.json
