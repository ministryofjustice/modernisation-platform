name: "ECS/EKS AMIs Check"

on:
  push:
    branches:
      - test-workflow-ecs-eks
    paths:
      - '.github/workflows/monitor-ecs-eks-amis.yml'
  workflow_dispatch:

# GLOBAL permissions
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "eu-west-2"

defaults:
  run:
    shell: bash

jobs:
  fetch-secrets:
    uses: ministryofjustice/modernisation-platform-github-actions/.github/workflows/aws-secrets-management.yml@3cd73da46642bf52bb4045d8abf05e1d96fc4a53
    permissions:
      id-token: write
      contents: read
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_NUMBER: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_NUMBER }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}

  monitor-ecs-eks-amis:
    runs-on: ubuntu-latest
    needs: fetch-secrets

    # JOB-LEVEL permissions (critical for OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@3cd73da46642bf52bb4045d8abf05e1d96fc4a53
        with:
          environment_management: ${{ needs.fetch-secrets.outputs.environment_management }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Set Account Number
        run: |
          ACCOUNT_NUMBER=$(jq -r -e '.aws_organizations_root_account_id' <<< $ENVIRONMENT_MANAGEMENT)
          echo "::add-mask::$ACCOUNT_NUMBER"
          echo ACCOUNT_NUMBER=$ACCOUNT_NUMBER >> $GITHUB_ENV

      - name: Check OIDC Environment Variables
        run: |
          echo "OIDC URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "OIDC Token: $ACTIONS_ID_TOKEN_REQUEST_TOKEN"

      - name: Debug OIDC Token
        run: |
          echo "Testing OIDC token issuance..."
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL?audience=sts.amazonaws.com" \
          | jq '{iss, sub, aud, exp, iat}'

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/github-actions-apply
          role-session-name: githubactionsrolesession
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Run ECS/EKS AMI Monitoring Script
        run: bash ./scripts/check-ecs-eks-amis.sh

      - name: Upload AMI CSV file
        uses: actions/upload-artifact@v4
        with:
          name: ecs-eks-ami-results
          path: ./outdated-amis.csv
          retention-days: 5
