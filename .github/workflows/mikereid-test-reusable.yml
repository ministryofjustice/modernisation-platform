name: mikereid test reusable

on:
  workflow_call:
    inputs:
      accounts:
        required: true
        type: string

jobs:
  print-accounts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        account: ${{ fromJson(inputs.accounts) }}
    steps:
      - run: |
            echo "Account: ${{ matrix.account }}"
