name: Check Inactive Collaborators

on:
  schedule:
    - cron: '30 9 */100,1-7 * 1'
  workflow_dispatch:

env:
    AWS_REGION: "eu-west-2"
    TEMPLATE_ID: "1f0f5ccc-0f67-4ee2-942f-6e48804828ea"
    EXPECTED_TEMPLATE_VERSION: "1"
    RATE_THRESHOLD: 100
    APP_ID: 2013696

permissions:
    id-token: write # This is required for requesting the JWT
    contents: read # This is required for actions/checkout
    issues: write # This is required to create issues

jobs:
  disable-login-for-inactive-collaborators:
    runs-on: ubuntu-latest
    steps:
      - name: Set Account Number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALLOWED_TEAM="modernisation-platform"
          AUTHOR=$(jq -r '.sender.login' $GITHUB_EVENT_PATH)
          echo $AUTHOR
          MEMBERS=$(gh api /orgs/ministryofjustice/teams/$ALLOWED_TEAM/members --jq '.[].login')
          if [[ ! " $MEMBERS " =~ " $AUTHOR " ]]; then
            echo "Only members of the '$ALLOWED_TEAM' team can create or modify workflow files."
            exit 1
          fi
