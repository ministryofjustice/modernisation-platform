name: "GitHub Environment Reviewers Automation"

on:
  push:
    paths:
      - 'environments/**.json'
      - 'scripts/git-create-environments.sh'
      - '.github/workflows/terraform-github.yml'
    branches:
      - main
  pull_request:
    paths:
      - 'environments/**.json'
      - 'scripts/git-create-environments.sh'
      - '.github/workflows/terraform-github.yml'
    branches:
      - main
    types: [opened, edited, reopened, synchronize]
  schedule:
    # * is a special character in YAML so you have to quote this string
    # trigger every Saturday at 12:00am
    - cron: '0 12 * * 6'
  workflow_dispatch:
defaults:
  run:
    shell: bash
env:
  RATE_THRESHOLD: 100
  APP_ID: 2013696
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
  pull-requests: write

jobs:
  fetch-secrets:
    uses: ministryofjustice/modernisation-platform-github-actions/.github/workflows/aws-secrets-management.yml@544c7bb214758a098b054014fa16ab86bad305b5 # v6.0.0
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_NUMBER: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_NUMBER }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}  
  create-github-environments:
    runs-on: ubuntu-latest
    needs: [ fetch-secrets ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # or "2" To retrieve the preceding commit.
      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@544c7bb214758a098b054014fa16ab86bad305b5 # v6.0.0
        with:
          mp_github_app_private_key: ${{ needs.fetch-secrets.outputs.mp_github_app_private_key }}
          slack_webhook_url: ${{ needs.fetch-secrets.outputs.slack_webhook_url }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
      - name: Create GitHub App token
        id: app-envts
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.APP_ID }}               
          private-key: ${{ env.MP_GITHUB_APP_PRIVATE_KEY }} 
          owner: "ministryofjustice"
          repositories: "modernisation-platform-environments"
      - name: Authenticate GitHub CLI as the App
        env:
          GH_TOKEN: ${{ steps.app-envts.outputs.token }}
        run: |
          gh auth status
      - name: Create GitHub member environments plan
        env:
          DRY_RUN: true
          GH_TOKEN: ${{ steps.app-envts.outputs.token }}
        run: |
          bash ./scripts/git-create-environments.sh
      - name: Create GitHub member environments apply
        if: github.event.ref == 'refs/heads/main'
        run: bash ./scripts/git-create-environments.sh
        env:
          GH_TOKEN: ${{ steps.app-envts.outputs.token }}
      - name: Slack failure notification
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@03ea5433c137af7c0495bc0cad1af10403fc800c # v3.0.2
        with:
          webhook-type: incoming-webhook
          payload: |
            {"blocks":[{"type": "section","text": {"type": "mrkdwn","text": ":no_entry: Failed GitHub Action:"}},{"type": "section","fields":[{"type": "mrkdwn","text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"},{"type": "mrkdwn","text": "*Job:*\n${{ github.job }}"},{"type": "mrkdwn","text": "*Repo:*\n${{ github.repository }}"}]}]}
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}