name: Enforce Workflow Change Authorisation
on:
  pull_request_target:
permissions:
  contents: read
  pull-requests: read
  id-token: write
env:
  APP_ID: 2013696
jobs:
  fetch-secrets:
    uses: ministryofjustice/modernisation-platform-github-actions/.github/workflows/aws-secrets-management.yml@5c713c93eea694829b1bd3f410d0b235053318ce # v4.0.0
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_NUMBER: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_NUMBER }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}

  validate-workflow-change-author:
    runs-on: ubuntu-latest
    needs: fetch-secrets
    steps:
      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@5c713c93eea694829b1bd3f410d0b235053318ce # v4.0.0
        with:
          slack_webhook_url: ${{ needs.fetch-secrets.outputs.slack_webhook_url }}
          mp_github_app_private_key: ${{ needs.fetch-secrets.outputs.mp_github_app_private_key }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ env.APP_ID }}               
          private-key: ${{ env.MP_GITHUB_APP_PRIVATE_KEY }} 
          owner: "ministryofjustice"
          repositories: "modernisation-platform"
      - name: Detect workflow file changes in PR
        id: detect_workflow_changes
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json files --jq '.files[].path')
          if echo "$FILES" | grep -q "^\.github/workflows/"; then
            echo "workflow_changed=true" >> $GITHUB_OUTPUT
          else
            echo "workflow_changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Verify PR author is authorised to modify workflows
        if: steps.detect_workflow_changes.outputs.workflow_changed == 'true'
        id: verify_author_authorisation
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          ALLOWED_TEAM="modernisation-platform"
          AUTHOR=$(jq -r '.sender.login' $GITHUB_EVENT_PATH)
          # Use GitHub API to check if author is in the allowed team
          MEMBERS=$(gh api orgs/ministryofjustice/teams/$ALLOWED_TEAM/members --jq '.[].login')
          if [[ ! " $MEMBERS " =~ " $AUTHOR " ]]; then
            echo "Only members of the '$ALLOWED_TEAM' team can create or modify workflow files."
            echo "UNAUTHORISED_AUTHOR=$AUTHOR" >> $GITHUB_ENV
            exit 1
          fi
          echo "AUTHOR is authorised to modify workflow files"

      - name: Slack failure notification
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        if: failure() && steps.verify_author_authorisation.outcome == 'failure'
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":no_entry: *Unauthorised Workflow Change Detected!*"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.workflow }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Job:*\n${{ github.job }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repo:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Unauthorised Author:*\n${{ env.UNAUTHORISED_AUTHOR }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*PR:*\n<${{ github.event.pull_request.html_url }}|#${{ github.event.pull_request.number }}>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
