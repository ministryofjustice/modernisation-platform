name: "Terraform: Single Sign On "

on:
  push:

    branches:
      - feature/6888-reusable-terraform-plan-apply
      
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  single-sign-on-plan-and-apply:
    uses: ./.github/workflows/reusable_terraform_plan_test_km.yml
    with:
      working_directory: "terraform/single-sign-on"
    secrets:
      environment_management: ${{ secrets.MODERNISATION_PLATFORM_ENVIRONMENTS }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      TERRAFORM_GITHUB_TOKEN: ${{ secrets.TERRAFORM_GITHUB_TOKEN }}