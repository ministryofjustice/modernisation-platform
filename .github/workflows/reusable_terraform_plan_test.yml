name: Reusable Terraform Plan and Apply

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      environment_management:
        required: true
        type: string
      terraform_workspace:
        required: true
        type: string
      account_number:
        required: true
        type: string
      pipeline_github_token:
        required: true
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest  # Define the runner for the setup job
    outputs:
      account_number: ${{ steps.extract_account.outputs.account_number }}
    steps:
      - uses: actions/checkout@v2
      - name: Set Account Number
        id: extract_account
        run: echo "::set-output name=account_number::$(jq -r -e '.aws_organizations_root_account_id' <<< ${{ inputs.environment_management }})"

  terraform_plan:
    needs: setup
    runs-on: ubuntu-latest  # Define the runner for the terraform_plan job
    steps:
      - uses: actions/checkout@v2
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: "arn:aws:iam::${{ needs.setup.outputs.account_number }}:role/ModernisationPlatformGithubActionsRole"
          role-session-name: githubactionsrolesession
          aws-region: ${{ inputs.aws_region }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "~1"
          terraform_wrapper: false
      - run: bash scripts/terraform-init.sh terraform/environments/bootstrap/delegate-access
      - run: bash scripts/terraform-plan.sh terraform/environments/bootstrap/delegate-access
      - name: Archive Plan Results
        uses: actions/upload-artifact@v2
        with:
          name: terraform-plan-output
          path: plan-output.log











