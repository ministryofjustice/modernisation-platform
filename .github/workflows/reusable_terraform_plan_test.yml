name: "Reusable Bootstrap Plan for Sprinkler"

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      tf_workspace:
        required: true
        type: string
    secrets:
      tf_state_bucket:
        required: true
      aws_account_number:
        required: true
      environment_management:
        required: true

jobs:
  delegate-access-plan:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      AWS_REGION: ${{ inputs.aws_region }}
      ENVIRONMENT_MANAGEMENT: ${{ secrets.environment_management }}
      TF_WORKSPACE: ${{ inputs.tf_workspace }}
      ACCOUNT_NUMBER: ${{ secrets.aws_account_number }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_NUMBER }}:role/ModernisationPlatformGithubActionsRole"
          role-session-name: githubactionsrolesession
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1"
          terraform_wrapper: false
      - run: bash scripts/terraform-init.sh terraform/environments/bootstrap/delegate-access
      - run: bash scripts/terraform-plan.sh terraform/environments/bootstrap/delegate-access




















