name: Cleanup of Stale Branches App POC

on:
  workflow_dispatch:
  push:
    branches:
      - issue-11298-poc
  #schedule:
  #- cron: '0 0 * * 0'
  #

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:

  fetch-secrets:
    uses: ministryofjustice/modernisation-platform-github-actions/.github/workflows/aws-secrets-management.yml@63da34b864617f7bdf019962a01861f718f42a3d # working-version
    secrets:
      MODERNISATION_PLATFORM_ACCOUNT_NUMBER: ${{ secrets.MODERNISATION_PLATFORM_ACCOUNT_NUMBER }}
      PASSPHRASE: ${{ secrets.PASSPHRASE }}

  cleanup:
    name: Cleanup Stale Branches in Modernisation Platform Repos
    runs-on: ubuntu-latest
    needs: fetch-secrets


    env:
      DEBUG: false
      DRY_RUN: false
      ORG: ministryofjustice
      PREFIX: modernisation-platform
      SKIP_BRANCHES: main
      INACTIVE_DAYS: 90

    steps:
      - name: Decrypt Secrets
        uses: ministryofjustice/modernisation-platform-github-actions/decrypt-secrets@63da34b864617f7bdf019962a01861f718f42a3d # working-version
        with:
          terraform_github_token: ${{ needs.fetch-secrets.outputs.terraform_github_token }}
          mp_github_app_private_key: ${{ needs.fetch-secrets.outputs.mp_github_app_private_key }}
          PASSPHRASE: ${{ secrets.PASSPHRASE }}

      - name: Ensure CLI Tools Are Installed
        run: |
          for tool in gh jq; do
            if ! command -v "$tool" &> /dev/null; then
              echo "вќЊ Required tool '$tool' is not installed."
              exit 1
            fi
          done

      # - name: Authenticate GitHub CLI
      #   run: |
      #     echo "${{ env.TERRAFORM_GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Confirm Key Set
        env:
          MY_VAR: ${{ env.MP_GITHUB_APP_PRIVATE_KEY }}
        run: |
          echo "First 6 chars: ${MY_VAR:0:6}"

      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: "2013696"                
          private-key: ${{ env.MP_GITHUB_APP_PRIVATE_KEY }} 
          owner: "ministryofjustice"
          repositories: "modernisation-platform"

      - name: Authenticate GitHub CLI as the App
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          echo "First 6 chars: ${MP_GITHUB_APP_PRIVATE_KEY:0:6}"
          # gh automatically uses GH_TOKEN if set вЂ” no `gh auth login` needed
          gh auth status

      - name: Query GitHub API rate limit (App installation)
        id: ratelimit
        env:
          APP_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          echo "Fetching API rate limit for App installation..."
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $APP_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit)

          echo "$RESPONSE" | jq '.resources.core'

          RESET_EPOCH=$(echo "$RESPONSE" | jq '.resources.core.reset')
          RESET_UTC=$(date -u -d @"$RESET_EPOCH" '+%Y-%m-%d %H:%M:%S UTC')
          echo "Rate limit resets at: $RESET_UTC"





